name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt ruff pytest
      - name: pytest
        run: pytest
      - name: ruff
        run: ruff check .
      - name: docker build
        run: docker build -t deals-platform-api .